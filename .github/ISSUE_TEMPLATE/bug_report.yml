name: Bug Report
description: Report a bug in Visual Agents
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug! Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open Visual Agents
        2. Run Claude Code with...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / GIFs
      description: If applicable, add screenshots or GIFs to help explain the problem.

  - type: dropdown
    id: environment
    attributes:
      label: Editor
      options:
        - VS Code
        - Antigravity (Google)
        - Cursor
        - Other VS Code fork
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Extension Version
      placeholder: "0.3.1"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Windows 11 / macOS 14 / Ubuntu 24.04"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem.
