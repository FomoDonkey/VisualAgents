<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00d4ff"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b68ee"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1e1e4a" stroke-width="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)" rx="8"/>
  <rect width="900" height="520" fill="url(#grid)" opacity="0.3" rx="8"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="#e2e8f0" letter-spacing="1">Architecture</text>
  <line x1="340" y1="48" x2="560" y2="48" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>

  <!-- ═══════ ROW 1: Event Sources ═══════ -->

  <!-- Claude Code CLI -->
  <g filter="url(#glow-sm)">
    <rect x="60" y="75" width="200" height="55" rx="8" fill="#1e293b" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="100" y="100" font-family="monospace" font-size="18">&#9889;</text>
    <text x="118" y="100" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#00d4ff">Claude Code CLI</text>
    <text x="160" y="118" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">Tool calls &amp; events</text>
  </g>

  <!-- VS Code IDE -->
  <g filter="url(#glow-sm)">
    <rect x="640" y="75" width="200" height="55" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
    <text x="680" y="100" font-family="monospace" font-size="18">&#9998;</text>
    <text x="698" y="100" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#22c55e">VS Code IDE</text>
    <text x="740" y="118" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">File &amp; terminal events</text>
  </g>

  <!-- ═══════ Arrows Row 1 → Row 2 ═══════ -->
  <line x1="160" y1="130" x2="160" y2="168" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.7"/>
  <line x1="740" y1="130" x2="740" y2="168" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)" opacity="0.7"/>

  <!-- ═══════ ROW 2: Capture Layer ═══════ -->

  <!-- Hook Script -->
  <g>
    <rect x="70" y="170" width="180" height="48" rx="6" fill="#162032" stroke="#0e7490" stroke-width="1"/>
    <text x="160" y="194" text-anchor="middle" font-family="monospace" font-size="12" fill="#22d3ee">Hook Script</text>
    <text x="160" y="210" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">Node.js  PreTool/PostTool</text>
  </g>

  <!-- IDE Watcher -->
  <g>
    <rect x="650" y="170" width="180" height="48" rx="6" fill="#162032" stroke="#15803d" stroke-width="1"/>
    <text x="740" y="194" text-anchor="middle" font-family="monospace" font-size="12" fill="#4ade80">IDE Watcher</text>
    <text x="740" y="210" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">onDidSave  FileSystem  Terminal</text>
  </g>

  <!-- ═══════ Arrows Row 2 → Row 3 ═══════ -->
  <line x1="160" y1="218" x2="160" y2="255" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.7"/>
  <line x1="740" y1="218" x2="740" y2="255" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)" opacity="0.7"/>

  <!-- ═══════ ROW 3: Transport ═══════ -->

  <!-- events.jsonl -->
  <g>
    <rect x="80" y="257" width="160" height="40" rx="6" fill="#1e1b3a" stroke="#7b68ee" stroke-width="1"/>
    <text x="160" y="282" text-anchor="middle" font-family="monospace" font-size="12" fill="#a78bfa">events.jsonl</text>
  </g>

  <!-- postMessage -->
  <g>
    <rect x="660" y="257" width="160" height="40" rx="6" fill="#1e1b3a" stroke="#7b68ee" stroke-width="1"/>
    <text x="740" y="282" text-anchor="middle" font-family="monospace" font-size="12" fill="#a78bfa">postMessage</text>
  </g>

  <!-- ═══════ Arrows Row 3 → Row 4 (converge) ═══════ -->
  <path d="M 160 297 L 160 320 Q 160 335 175 335 L 395 335" stroke="#7b68ee" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)" opacity="0.6"/>
  <path d="M 740 297 L 740 320 Q 740 335 725 335 L 505 335" stroke="#7b68ee" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)" opacity="0.6"/>

  <!-- ═══════ ROW 4: Engine (center) ═══════ -->
  <g filter="url(#glow)">
    <rect x="395" y="315" width="110" height="44" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="450" y="337" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#fbbf24">Realtime</text>
    <text x="450" y="352" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#fbbf24">Engine</text>
  </g>

  <!-- ═══════ Arrow Row 4 → Row 5 ═══════ -->
  <line x1="450" y1="359" x2="450" y2="390" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-orange)" opacity="0.7"/>

  <!-- ═══════ ROW 5: Processing ═══════ -->

  <!-- Agent Manager (center) -->
  <g filter="url(#glow-sm)">
    <rect x="355" y="392" width="190" height="48" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="450" y="414" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#fbbf24">Agent Manager</text>
    <text x="450" y="432" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">5 agents  FSM  pathfinding</text>
  </g>

  <!-- ═══════ Arrows Row 5 → Row 6 (fan out) ═══════ -->
  <path d="M 370 440 L 190 470" stroke="#f59e0b" stroke-width="1" fill="none" marker-end="url(#arrow-orange)" opacity="0.5"/>
  <line x1="450" y1="440" x2="450" y2="470" stroke="#f59e0b" stroke-width="1" marker-end="url(#arrow-orange)" opacity="0.5"/>
  <path d="M 530 440 L 710 470" stroke="#f59e0b" stroke-width="1" fill="none" marker-end="url(#arrow-orange)" opacity="0.5"/>

  <!-- ═══════ ROW 6: Output Layer ═══════ -->

  <!-- Phaser Renderer -->
  <g>
    <rect x="80" y="472" width="150" height="36" rx="6" fill="#162032" stroke="#8b5cf6" stroke-width="1"/>
    <text x="108" y="494" font-family="monospace" font-size="18">&#9670;</text>
    <text x="125" y="495" font-family="monospace" font-size="11" fill="#a78bfa">Phaser 3</text>
  </g>

  <!-- Effects -->
  <g>
    <rect x="375" y="472" width="150" height="36" rx="6" fill="#162032" stroke="#ff6ec7" stroke-width="1"/>
    <text x="401" y="494" font-family="monospace" font-size="18">&#10024;</text>
    <text x="418" y="495" font-family="monospace" font-size="11" fill="#ff6ec7">Effects</text>
  </g>

  <!-- HTML UI -->
  <g>
    <rect x="670" y="472" width="150" height="36" rx="6" fill="#162032" stroke="#06b6d4" stroke-width="1"/>
    <text x="696" y="494" font-family="monospace" font-size="18">&#9635;</text>
    <text x="712" y="495" font-family="monospace" font-size="11" fill="#22d3ee">HTML UI</text>
  </g>

  <!-- Labels for output -->
  <text x="155" y="504" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">sprites  camera  canvas</text>
  <text x="450" y="504" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">particles  neon  glow</text>
  <text x="745" y="504" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">roster  log  stats</text>

  <!-- Border -->
  <rect x="1" y="1" width="898" height="518" rx="8" fill="none" stroke="#7b68ee" stroke-width="0.5" opacity="0.15"/>
</svg>
