<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <linearGradient id="neon-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b68ee"/>
    </linearGradient>
    <linearGradient id="neon-pink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6ec7"/>
      <stop offset="100%" style="stop-color:#ff3366"/>
    </linearGradient>
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#1e1e4a" stroke-width="0.5"/>
    </pattern>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#ffffff" stroke-width="0.3" opacity="0.03"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#grid)" opacity="0.4"/>
  <rect width="1200" height="400" fill="url(#scanlines)"/>

  <!-- Ambient glow spots -->
  <circle cx="200" cy="200" r="200" fill="#00d4ff" opacity="0.03"/>
  <circle cx="1000" cy="200" r="200" fill="#7b68ee" opacity="0.03"/>
  <circle cx="600" cy="350" r="150" fill="#ff6ec7" opacity="0.02"/>

  <!-- Office floor (pixel grid) -->
  <g opacity="0.15">
    <rect x="60" y="180" width="240" height="160" rx="4" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <rect x="320" y="180" width="180" height="160" rx="4" fill="none" stroke="#50fa7b" stroke-width="1.5"/>
    <rect x="60" y="180" width="240" height="160" fill="#00d4ff" opacity="0.05"/>
    <rect x="320" y="180" width="180" height="160" fill="#50fa7b" opacity="0.05"/>
  </g>

  <!-- Agent 1 - Blue (Atlas) -->
  <g transform="translate(120, 220)" filter="url(#glow-soft)">
    <!-- Shadow -->
    <ellipse cx="12" cy="42" rx="10" ry="3" fill="#00d4ff" opacity="0.2"/>
    <!-- Body -->
    <rect x="4" y="20" width="16" height="16" rx="2" fill="#2563eb"/>
    <rect x="5" y="21" width="14" height="6" fill="#3b82f6" opacity="0.5"/>
    <!-- Head -->
    <rect x="2" y="4" width="20" height="16" rx="3" fill="#f5d0a9"/>
    <rect x="3" y="5" width="18" height="4" fill="#fde68a" opacity="0.3"/>
    <!-- Eyes -->
    <rect x="6" y="10" width="4" height="5" rx="2" fill="white"/>
    <rect x="14" y="10" width="4" height="5" rx="2" fill="white"/>
    <rect x="7" y="11" width="2" height="3" rx="1" fill="#2563eb"/>
    <rect x="15" y="11" width="2" height="3" rx="1" fill="#2563eb"/>
    <rect x="8" y="12" width="1" height="1" fill="white" opacity="0.8"/>
    <rect x="16" y="12" width="1" height="1" fill="white" opacity="0.8"/>
    <!-- Smile -->
    <rect x="9" y="16" width="6" height="1" rx="0.5" fill="#c2855a"/>
    <!-- Legs -->
    <rect x="6" y="36" width="4" height="6" rx="1" fill="#1e40af"/>
    <rect x="14" y="36" width="4" height="6" rx="1" fill="#1e40af"/>
    <!-- Name -->
    <text x="12" y="-4" text-anchor="middle" font-family="monospace" font-size="8" fill="#3b82f6" font-weight="bold">Atlas</text>
  </g>

  <!-- Agent 2 - Red (Nova) -->
  <g transform="translate(200, 240)" filter="url(#glow-soft)">
    <ellipse cx="12" cy="42" rx="10" ry="3" fill="#ef4444" opacity="0.2"/>
    <rect x="4" y="20" width="16" height="16" rx="2" fill="#dc2626"/>
    <rect x="5" y="21" width="14" height="6" fill="#ef4444" opacity="0.5"/>
    <rect x="2" y="4" width="20" height="16" rx="3" fill="#e8c49a"/>
    <rect x="3" y="5" width="18" height="4" fill="#92400e" opacity="0.4"/>
    <rect x="6" y="10" width="4" height="5" rx="2" fill="white"/>
    <rect x="14" y="10" width="4" height="5" rx="2" fill="white"/>
    <rect x="7" y="11" width="2" height="3" rx="1" fill="#dc2626"/>
    <rect x="15" y="11" width="2" height="3" rx="1" fill="#dc2626"/>
    <rect x="8" y="12" width="1" height="1" fill="white" opacity="0.8"/>
    <rect x="16" y="12" width="1" height="1" fill="white" opacity="0.8"/>
    <rect x="8" y="16" width="8" height="1" rx="0.5" fill="#c2855a"/>
    <rect x="6" y="36" width="4" height="6" rx="1" fill="#991b1b"/>
    <rect x="14" y="36" width="4" height="6" rx="1" fill="#991b1b"/>
    <text x="12" y="-4" text-anchor="middle" font-family="monospace" font-size="8" fill="#ef4444" font-weight="bold">Nova</text>
  </g>

  <!-- Agent 3 - Green (Sage) -->
  <g transform="translate(350, 230)" filter="url(#glow-soft)">
    <ellipse cx="12" cy="42" rx="10" ry="3" fill="#22c55e" opacity="0.2"/>
    <rect x="4" y="20" width="16" height="16" rx="2" fill="#16a34a"/>
    <rect x="5" y="21" width="14" height="6" fill="#22c55e" opacity="0.5"/>
    <rect x="2" y="4" width="20" height="16" rx="3" fill="#f5d0a9"/>
    <rect x="6" y="10" width="4" height="5" rx="2" fill="white"/>
    <rect x="14" y="10" width="4" height="5" rx="2" fill="white"/>
    <rect x="7" y="11" width="2" height="3" rx="1" fill="#16a34a"/>
    <rect x="15" y="11" width="2" height="3" rx="1" fill="#16a34a"/>
    <rect x="8" y="12" width="1" height="1" fill="white" opacity="0.8"/>
    <rect x="16" y="12" width="1" height="1" fill="white" opacity="0.8"/>
    <rect x="9" y="16" width="6" height="1" rx="0.5" fill="#c2855a"/>
    <rect x="6" y="36" width="4" height="6" rx="1" fill="#15803d"/>
    <rect x="14" y="36" width="4" height="6" rx="1" fill="#15803d"/>
    <text x="12" y="-4" text-anchor="middle" font-family="monospace" font-size="8" fill="#22c55e" font-weight="bold">Sage</text>
  </g>

  <!-- Desk with monitor (Dev Floor) -->
  <g transform="translate(140, 260)" opacity="0.4">
    <rect x="0" y="0" width="30" height="16" rx="2" fill="#374151"/>
    <rect x="8" y="-14" width="14" height="12" rx="1" fill="#1e293b" stroke="#3b82f6" stroke-width="0.5"/>
    <rect x="9" y="-13" width="12" height="10" fill="#0f172a"/>
    <!-- Code lines on monitor -->
    <rect x="10" y="-12" width="8" height="1" fill="#3b82f6" opacity="0.6"/>
    <rect x="10" y="-10" width="6" height="1" fill="#22c55e" opacity="0.6"/>
    <rect x="10" y="-8" width="10" height="1" fill="#8b5cf6" opacity="0.6"/>
    <rect x="10" y="-6" width="5" height="1" fill="#f59e0b" opacity="0.6"/>
  </g>

  <!-- Server rack -->
  <g transform="translate(420, 250)" opacity="0.3">
    <rect x="0" y="0" width="16" height="30" rx="2" fill="#1e293b" stroke="#6366f1" stroke-width="0.5"/>
    <rect x="3" y="3" width="3" height="2" rx="0.5" fill="#22c55e"/>
    <rect x="3" y="7" width="3" height="2" rx="0.5" fill="#22c55e"/>
    <rect x="3" y="11" width="3" height="2" rx="0.5" fill="#ef4444"/>
    <rect x="3" y="15" width="3" height="2" rx="0.5" fill="#22c55e"/>
    <rect x="3" y="19" width="3" height="2" rx="0.5" fill="#f59e0b"/>
    <rect x="8" y="3" width="5" height="2" rx="0.5" fill="#334155"/>
    <rect x="8" y="7" width="5" height="2" rx="0.5" fill="#334155"/>
    <rect x="8" y="11" width="5" height="2" rx="0.5" fill="#334155"/>
    <rect x="8" y="15" width="5" height="2" rx="0.5" fill="#334155"/>
    <rect x="8" y="19" width="5" height="2" rx="0.5" fill="#334155"/>
  </g>

  <!-- Floating particles -->
  <circle cx="100" cy="210" r="2" fill="#00d4ff" opacity="0.4"/>
  <circle cx="280" cy="250" r="1.5" fill="#3b82f6" opacity="0.5"/>
  <circle cx="180" cy="310" r="1" fill="#7b68ee" opacity="0.3"/>
  <circle cx="380" cy="220" r="2" fill="#22c55e" opacity="0.4"/>
  <circle cx="460" cy="260" r="1.5" fill="#6366f1" opacity="0.3"/>
  <circle cx="340" cy="300" r="1" fill="#50fa7b" opacity="0.4"/>
  <circle cx="150" cy="190" r="1.5" fill="#ff6ec7" opacity="0.2"/>
  <circle cx="490" cy="200" r="1" fill="#f59e0b" opacity="0.3"/>

  <!-- Glowing trail behind agent -->
  <g opacity="0.15">
    <circle cx="340" cy="258" r="3" fill="#22c55e"/>
    <circle cx="332" cy="256" r="2.5" fill="#22c55e"/>
    <circle cx="324" cy="254" r="2" fill="#22c55e"/>
    <circle cx="316" cy="252" r="1.5" fill="#22c55e"/>
    <circle cx="308" cy="250" r="1" fill="#22c55e"/>
  </g>

  <!-- Main title -->
  <g filter="url(#glow-strong)">
    <text x="830" y="145" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#neon-blue)" letter-spacing="-2">
      Visual Agents
    </text>
  </g>

  <!-- Subtitle -->
  <text x="830" y="185" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="20" fill="#94a3b8" letter-spacing="1">
    Watch AI agents work in a cinematic pixel-art office
  </text>

  <!-- Decorative line -->
  <line x1="660" y1="205" x2="1000" y2="205" stroke="url(#neon-blue)" stroke-width="1" opacity="0.4"/>

  <!-- Feature badges -->
  <g transform="translate(635, 230)">
    <!-- Real-time -->
    <g>
      <rect x="0" y="0" width="120" height="30" rx="15" fill="#1e293b" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>
      <text x="16" y="20" font-family="monospace" font-size="14">&#9889;</text>
      <text x="32" y="20" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#00d4ff">Real-time</text>
    </g>
    <!-- Pixel Art -->
    <g transform="translate(135, 0)">
      <rect x="0" y="0" width="120" height="30" rx="15" fill="#1e293b" stroke="#7b68ee" stroke-width="1" opacity="0.8"/>
      <text x="16" y="20" font-family="monospace" font-size="14">&#9670;</text>
      <text x="32" y="20" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#7b68ee">Pixel Art</text>
    </g>
    <!-- 5 Agents -->
    <g transform="translate(270, 0)">
      <rect x="0" y="0" width="120" height="30" rx="15" fill="#1e293b" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
      <text x="16" y="20" font-family="monospace" font-size="14">&#9673;</text>
      <text x="32" y="20" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#22c55e">5 Agents</text>
    </g>
  </g>

  <!-- Tech stack icons -->
  <g transform="translate(670, 285)">
    <rect x="0" y="0" width="85" height="24" rx="4" fill="#1e293b" opacity="0.6"/>
    <text x="10" y="16" font-family="monospace" font-size="10" fill="#3178c6">TypeScript</text>
    <rect x="95" y="0" width="70" height="24" rx="4" fill="#1e293b" opacity="0.6"/>
    <text x="105" y="16" font-family="monospace" font-size="10" fill="#8b5cf6">Phaser 3</text>
    <rect x="175" y="0" width="50" height="24" rx="4" fill="#1e293b" opacity="0.6"/>
    <text x="185" y="16" font-family="monospace" font-size="10" fill="#f59e0b">Vite</text>
    <rect x="235" y="0" width="75" height="24" rx="4" fill="#1e293b" opacity="0.6"/>
    <text x="245" y="16" font-family="monospace" font-size="10" fill="#007acc">VS Code</text>
  </g>

  <!-- Credit -->
  <text x="830" y="350" text-anchor="middle" font-family="monospace" font-size="13" fill="#475569" letter-spacing="2">
    by 0xArlee
  </text>

  <!-- Border glow -->
  <rect x="1" y="1" width="1198" height="398" rx="8" fill="none" stroke="url(#neon-blue)" stroke-width="1" opacity="0.15"/>
</svg>
